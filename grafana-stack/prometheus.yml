global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # OTel Collector 자체 메트릭
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]

  # OTel Collector가 노출하는 앱 메트릭 (prometheus exporter)
  - job_name: "otel-app-metrics"
    static_configs:
      - targets: ["otel-collector:8889"]

  # Prometheus 자체 메트릭
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
